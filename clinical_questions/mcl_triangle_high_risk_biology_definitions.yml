concept_id: mcl_triangle_high_risk_biology
preferred_label: High-risk biology for MCL/TRIANGLE answerability
ki67_aeki_threshold_percent: 30
components:
  - component_id: blastoid_pleomorphic_morphology
    clinical_label: Blastoid or pleomorphic morphology
    source_priority:
      - RKKP_LYFO histology fields
      - Danish pathology code/text validation
    value_rule: validated blastoid or pleomorphic morphology value/code
    validation_status: requires_value_mapping
  - component_id: ki67_aeki_high
    clinical_label: Ki-67 AEKI high threshold
    source_priority:
      - public.SDS_pato.c_snomedkode
    value_rule: parsed AEKI percentage >= 30
    validation_status: aggregate_evidence_found_requires_validation
  - component_id: tp53_p53_del17p
    clinical_label: TP53 mutation/deletion, del17p, or high p53
    source_priority:
      - pathology/FISH/molecular fields
    value_rule: validated TP53/p53/del17p field, code, or aggregate text-derived evidence
    validation_status: requires_value_mapping
  - component_id: high_mipi
    clinical_label: High MIPI
    source_priority:
      - RKKP_LYFO MIPI component fields
    value_rule: computed MIPI high-risk category from validated components
    validation_status: requires_score_validation
  - component_id: high_mipic
    clinical_label: High MIPI-c
    source_priority:
      - RKKP_LYFO MIPI components
      - Ki-67 AEKI evidence
    value_rule: computed MIPI-c high-risk category from validated components including Ki-67
    validation_status: requires_score_validation
  - component_id: ldh_component
    clinical_label: LDH component
    source_priority:
      - RKKP_LYFO.Reg_LDHVaerdi
    value_rule: validated LDH availability and high/normal interpretation
    validation_status: requires_value_mapping
  - component_id: stage_component
    clinical_label: Stage component
    source_priority:
      - RKKP_LYFO.Reg_Stadium
    value_rule: validated Ann Arbor/stage value mapping
    validation_status: requires_value_mapping
  - component_id: performance_status_component
    clinical_label: Performance status component
    source_priority:
      - RKKP_LYFO.Reg_PerformanceStatusWHO
    value_rule: validated WHO/ECOG value mapping
    validation_status: requires_value_mapping
classification_rules:
  high_risk: one_or_more_validated_high_risk_component_positive
  standard_risk: all_required_high_risk_components_known_and_negative
  unknown: any_required_component_missing_or_unvalidated
notes: >
  This configuration is for aggregate answerability counts only. Missing high-risk
  components must not be treated as standard risk.
