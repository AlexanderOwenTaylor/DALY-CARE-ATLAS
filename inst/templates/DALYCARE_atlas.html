<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DALY-CARE Atlas</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2933;
      --muted: #5b6773;
      --line: #d8dee6;
      --panel: #f7f9fb;
      --accent: #1f6f8b;
      --warn: #a15c00;
      --bad: #a12828;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: #fff;
    }
    header {
      padding: 28px 36px 18px;
      border-bottom: 1px solid var(--line);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      font-weight: 650;
      letter-spacing: 0;
    }
    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }
    main {
      padding: 24px 36px 42px;
      display: grid;
      gap: 26px;
    }
    section {
      border-top: 1px solid var(--line);
      padding-top: 18px;
    }
    h2 {
      font-size: 20px;
      margin: 0 0 12px;
      font-weight: 650;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }
    label {
      color: var(--muted);
      font-size: 13px;
      display: grid;
      gap: 4px;
    }
    select {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 13px;
      padding: 7px 9px;
      min-width: 170px;
    }
    .panel-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .panel-nav button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      font: inherit;
      font-size: 13px;
      padding: 7px 10px;
    }
    .panel-nav button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px 14px;
    }
    .metric b {
      display: block;
      font-size: 24px;
      margin-bottom: 3px;
    }
    .metric span {
      color: var(--muted);
      font-size: 13px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px 9px;
      text-align: left;
      vertical-align: top;
    }
    th {
      color: #344150;
      background: #f2f5f8;
      font-weight: 650;
      position: sticky;
      top: 0;
    }
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
    }
    .ok { color: var(--accent); font-weight: 650; }
    .warning { color: var(--warn); font-weight: 650; }
    .error { color: var(--bad); font-weight: 650; }
    .empty {
      color: var(--muted);
      padding: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
    }
    .panel-block {
      margin-top: 18px;
    }
    h3 {
      font-size: 16px;
      margin: 0 0 8px;
      font-weight: 650;
    }
  </style>
  <script src="DALYCARE_atlas_payload.js"></script>
</head>
<body>
  <header>
    <h1>DALY-CARE Atlas</h1>
    <p class="subtitle" id="atlas-subtitle">Loading atlas payload...</p>
  </header>
  <main>
    <section>
      <h2>Run Summary</h2>
      <div id="summary" class="summary-grid"></div>
    </section>
    <section>
      <h2>Source Catalog</h2>
      <div class="toolbar">
        <label>Load status
          <select id="source-filter">
            <option value="">All sources</option>
          </select>
        </label>
      </div>
      <div id="sources"></div>
    </section>
    <section>
      <h2>Checks</h2>
      <div class="toolbar">
        <label>Severity
          <select id="check-filter">
            <option value="">All checks</option>
            <option value="error">Errors</option>
            <option value="warning">Warnings</option>
            <option value="ok">OK</option>
          </select>
        </label>
      </div>
      <div id="checks"></div>
    </section>
    <section>
      <h2>Panels</h2>
      <div id="panel-nav" class="panel-nav"></div>
      <div id="panels"></div>
    </section>
  </main>
  <script>
    (function () {
      const payload = window.DALYCARE_ATLAS_PAYLOAD || {};
      const subtitle = document.getElementById("atlas-subtitle");
      subtitle.textContent = `Generated ${payload.generated_at || "unknown"} from ${payload.source_count || 0} mapped sources.`;

      function metric(label, value) {
        const div = document.createElement("div");
        div.className = "metric";
        div.innerHTML = `<b>${value}</b><span>${label}</span>`;
        return div;
      }

      const summary = document.getElementById("summary");
      summary.appendChild(metric("Sources", payload.source_count || 0));
      summary.appendChild(metric("Loaded", payload.loaded_source_count || 0));
      summary.appendChild(metric("Columns", payload.column_count || 0));
      summary.appendChild(metric("Checks", payload.check_count || 0));
      summary.appendChild(metric("Warnings", payload.warning_count || 0));
      summary.appendChild(metric("Errors", payload.error_count || 0));

      function renderTable(rows, maxRows) {
        if (!rows || !rows.length) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "No rows available.";
          return empty;
        }
        const cols = Object.keys(rows[0]);
        const table = document.createElement("table");
        const thead = document.createElement("thead");
        thead.innerHTML = `<tr>${cols.map(c => `<th>${escapeHtml(c)}</th>`).join("")}</tr>`;
        table.appendChild(thead);
        const tbody = document.createElement("tbody");
        rows.slice(0, maxRows || 100).forEach(row => {
          const tr = document.createElement("tr");
          tr.innerHTML = cols.map(c => `<td>${escapeHtml(row[c])}</td>`).join("");
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        const wrap = document.createElement("div");
        wrap.className = "table-wrap";
        wrap.appendChild(table);
        return wrap;
      }

      function escapeHtml(value) {
        if (value === null || value === undefined) return "";
        return String(value).replace(/[&<>"']/g, ch => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#039;"
        }[ch]));
      }

      function renderInto(id, node) {
        const target = document.getElementById(id);
        target.innerHTML = "";
        target.appendChild(node);
      }

      function uniqueValues(rows, key) {
        return Array.from(new Set((rows || []).map(row => row[key]).filter(Boolean))).sort();
      }

      function fillSelect(select, values) {
        values.forEach(value => {
          const option = document.createElement("option");
          option.value = value;
          option.textContent = value;
          select.appendChild(option);
        });
      }

      const sources = payload.sources || [];
      const sourceFilter = document.getElementById("source-filter");
      fillSelect(sourceFilter, uniqueValues(sources, "load_status"));
      sourceFilter.addEventListener("change", () => {
        const wanted = sourceFilter.value;
        renderInto("sources", renderTable(wanted ? sources.filter(row => row.load_status === wanted) : sources, 200));
      });
      renderInto("sources", renderTable(sources, 200));

      const severityRank = { error: 0, warning: 1, ok: 2 };
      const checks = (payload.checks || []).slice().sort((a, b) => {
        return (severityRank[a.severity] ?? 9) - (severityRank[b.severity] ?? 9);
      });
      const checkFilter = document.getElementById("check-filter");
      checkFilter.addEventListener("change", () => {
        const wanted = checkFilter.value;
        renderInto("checks", renderTable(wanted ? checks.filter(row => row.severity === wanted) : checks, 200));
      });
      renderInto("checks", renderTable(checks, 200));

      const panels = document.getElementById("panels");
      const panelNav = document.getElementById("panel-nav");
      const panelData = payload.panels || {};
      const panelTitles = {
        lab_npu_code_coverage: "Lab NPU Code Coverage",
        diagnosis_icd_groups: "Diagnosis ICD Groups",
        medication_atc_groups: "Medication ATC Groups",
        damyda_feature_coverage: "DaMyDa Feature Coverage",
        registry_clinical_summary: "Registry Clinical Summary",
        damyda_clinical_profile: "DaMyDa Clinical Profile",
        damyda_numeric_fields: "DaMyDa Numeric Fields",
        lyfo_clinical_profile: "LYFO Clinical Profile",
        cll_clinical_profile: "CLL Clinical Profile",
        sp_operational_sources: "SP Operational Sources",
        source_availability_drift: "Source Availability Drift"
      };

      function panelTitle(name) {
        return panelTitles[name] || name.replace(/_/g, " ").replace(/\b\w/g, ch => ch.toUpperCase());
      }

      Object.keys(panelData).forEach(name => {
        const id = `panel-${name}`;
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = panelTitle(name);
        button.addEventListener("click", () => document.getElementById(id).scrollIntoView({ behavior: "smooth", block: "start" }));
        panelNav.appendChild(button);
        const block = document.createElement("div");
        block.className = "panel-block";
        block.id = id;
        const h = document.createElement("h3");
        h.textContent = panelTitle(name);
        block.appendChild(h);
        block.appendChild(renderTable(panelData[name], 100));
        panels.appendChild(block);
      });
      if (!Object.keys(panelData).length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No panel outputs were generated.";
        panels.appendChild(empty);
      }
    })();
  </script>
</body>
</html>
